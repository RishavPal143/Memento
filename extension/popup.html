<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Memento</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 10px;
      background-color: #0F172A; /* Slate 900 */
      color: #F8FAFC; /* Slate 50 */
      width: 290px;
    }

    .card {
      background: rgba(30, 41, 59, 0.7); /* Slate 800 with transparency */
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 14px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #34D399, #059669); /* Emerald gradient */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 11px;
      color: #94A3B8; /* Slate 400 */
      margin: 2px 0 0 0;
    }

    .divider {
      border: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 12px 0;
    }

    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      max-width: 190px;
    }

    .setting-title {
      font-size: 13px;
      font-weight: 600;
      color: #E2E8F0;
    }

    .setting-desc {
      font-size: 10px;
      color: #64748B; /* Slate 500 */
    }

    /* Switch Styles */
    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #334155;
      transition: .3s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: #E2E8F0;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #10B981; /* Emerald 500 */
    }

    input:checked + .slider:before {
      transform: translateX(18px);
      background-color: #FFFFFF;
    }

    /* Button Styles */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 8px;
      background: linear-gradient(135deg, #10B981, #059669);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 8px -1px rgba(16, 185, 129, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #334155;
      color: #64748B;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status-msg {
      font-size: 10px;
      color: #94A3B8;
      text-align: center;
      margin-top: 8px;
      min-height: 15px;
      word-break: break-all;
    }

    .status-success {
      color: #34D399;
    }

    .status-error {
      color: #F87171;
    }

    .status-warning {
      color: #FBBF24;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="logo-icon">🧠</span>
      <h1>Memento</h1>
    </div>
    <p class="subtitle">Internet Memory Assistant</p>
    
    <hr class="divider">
    
    <div class="settings-group">
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-title">Auto-save Pages</span>
          <span class="setting-desc">Save webpages as you browse</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="auto-save-toggle">
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-title">Save Only Important</span>
          <span class="setting-desc">Discard pages with AI score < 60</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="important-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    
    <div class="action-section">
      <button id="save-page-btn" class="btn">
        <span>💾</span> Save Current Page
      </button>
      <div id="status-message" class="status-msg">Status: Idle</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
